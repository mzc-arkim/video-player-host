<!-- video-player.html (webview 안에서 로드되는 로컬 HTML) -->
<!doctype html>
<html>
    <body style="margin: 0; background: #000">
        <video id="player" controls width="100%" height="210px"></video>
        <p
            id="debug"
            style="
                color: lime;
                font-size: 10px;
                word-break: break-all;
                position: absolute;
                top: 0;
                left: 0;
                z-index: 999;
                margin: 4px;
            "
        ></p>
        <script>
            var dbg = document.getElementById("debug");
            function log(msg) {
                dbg.textContent += msg + "\n";
                console.log("[video-player]", msg);
            }

            try {
                var hash = window.location.hash.substring(1);
                log("hash length: " + hash.length);

                var b64 = hash.replace(/-/g, "+").replace(/_/g, "/");
                var decoded = atob(b64);
                var params;
                try {
                    params = JSON.parse(decoded);
                    log("params parsed (JSON)");
                } catch (_e) {
                    params = { src: decoded };
                    log("params parsed (plain URL)");
                }

                var src = params.src;
                var authorization = params.authorization;
                var projectId = params.projectId;

                log("src: " + (src ? src.substring(0, 80) + "..." : "null"));
                log("authorization: " + (authorization ? "Bearer ***" + authorization.slice(-6) : "null"));
                log("projectId: " + (projectId || "null"));

                function isS3Direct(uri) {
                    if (!uri) return false;
                    return /\.s3[.-].*\.amazonaws\.com/.test(uri);
                }

                var s3 = isS3Direct(src);
                log("isS3Direct: " + s3);

                if (src) {
                    var video = document.getElementById("player");

                    video.addEventListener("error", function () {
                        var e = video.error;
                        log("video error: code=" + e.code + " message=" + (e.message || "unknown"));
                    });

                    video.addEventListener("loadedmetadata", function () {
                        log("video loadedmetadata: " + video.videoWidth + "x" + video.videoHeight + " duration=" + video.duration);
                    });

                    var fetchHeaders = {};
                    if (!s3 && authorization) {
                        fetchHeaders["Authorization"] = "Bearer " + authorization;
                        if (projectId) fetchHeaders["projectId"] = projectId;
                    }

                    log("fetch mode: " + (s3 ? "S3 (no auth)" : "CDN (auth)"));

                    fetch(src, !s3 ? { headers: fetchHeaders } : {})
                        .then(function (res) {
                            log("fetch status: " + res.status + " " + res.statusText);
                            var ct = res.headers.get("content-type") || "unknown";
                            log("content-type: " + ct);
                            log("content-length: " + (res.headers.get("content-length") || "unknown"));
                            if (!res.ok) {
                                return res.text().then(function (body) {
                                    log("error body: " + body.substring(0, 300));
                                    throw new Error("HTTP " + res.status);
                                });
                            }
                            // CDN이 JSON 응답(메타데이터)을 반환하는 경우 내용 확인
                            if (ct.indexOf("application/json") !== -1) {
                                return res.text().then(function (text) {
                                    log("json response: " + text.substring(0, 500));
                                    return { __json: text };
                                });
                            }
                            return res.blob();
                        })
                        .then(function (result) {
                            if (!result) return;
                            // JSON 응답인 경우: 영상 URL 추출 시도
                            if (result.__json) {
                                log("response is JSON, not video binary");
                                return;
                            }
                            log("blob size: " + result.size + " type: " + result.type);
                            var blobUrl = URL.createObjectURL(result);
                            video.src = blobUrl;
                            video.load();
                            log("video loaded from blob");
                        })
                        .catch(function (err) {
                            log("fetch error: " + err.message);
                        });
                } else {
                    log("no src provided");
                }
            } catch (e) {
                log("init error: " + e.message);
            }
        </script>
    </body>
</html>
