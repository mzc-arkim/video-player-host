<!-- video-player.html (webview 안에서 로드되는 로컬 HTML) -->
<!doctype html>
<html>
    <head>
        <script src="https://cdn.dashjs.org/v4.7.4/dash.all.min.js"></script>
    </head>
    <body style="margin: 0; background: #000">
        <video id="player" controls width="100%" height="210px"></video>
        <p
            id="debug"
            style="
                color: lime;
                font-size: 10px;
                word-break: break-all;
                position: absolute;
                top: 0;
                left: 0;
                z-index: 999;
                margin: 4px;
            "
        ></p>
        <script>
            var dbg = document.getElementById("debug");
            function log(msg) {
                dbg.textContent += msg + "\n";
                console.log("[video-player]", msg);
            }

            try {
                var hash = window.location.hash.substring(1);
                log("hash length: " + hash.length);

                var b64 = hash.replace(/-/g, "+").replace(/_/g, "/");
                var decoded = atob(b64);
                var params;
                try {
                    params = JSON.parse(decoded);
                    log("params parsed (JSON)");
                } catch (_e) {
                    params = { src: decoded };
                    log("params parsed (plain URL)");
                }

                var src = params.src;
                var authorization = params.authorization;
                var projectId = params.projectId;

                log("src: " + (src ? src.substring(0, 80) + "..." : "null"));
                log("authorization: " + (authorization ? "Bearer ***" + authorization.slice(-6) : "null"));
                log("projectId: " + (projectId || "null"));

                function isS3Direct(uri) {
                    if (!uri) return false;
                    return /\.s3[.-].*\.amazonaws\.com/.test(uri);
                }

                var s3 = isS3Direct(src);
                log("isS3Direct: " + s3);

                if (src) {
                    var video = document.getElementById("player");

                    video.addEventListener("error", function () {
                        var e = video.error;
                        log("video error: code=" + e.code + " message=" + (e.message || "unknown"));
                    });

                    video.addEventListener("loadedmetadata", function () {
                        log("video loadedmetadata: " + video.videoWidth + "x" + video.videoHeight + " duration=" + video.duration);
                    });

                    if (s3) {
                        // S3 pre-signed URL: 직접 재생
                        log("mode: S3 direct playback");
                        fetch(src)
                            .then(function (res) {
                                log("fetch status: " + res.status);
                                if (!res.ok) throw new Error("HTTP " + res.status);
                                return res.blob();
                            })
                            .then(function (blob) {
                                log("blob size: " + blob.size + " type: " + blob.type);
                                video.src = URL.createObjectURL(blob);
                                video.load();
                            })
                            .catch(function (err) {
                                log("S3 fetch error: " + err.message);
                            });
                    } else if (authorization) {
                        // CDN URL: dash.js + auth 헤더로 DASH 스트리밍 재생
                        log("mode: DASH streaming with auth");
                        var dashPlayer = dashjs.MediaPlayer().create();

                        dashPlayer.setRequestInterceptor(function (request) {
                            request.headers["Authorization"] = "Bearer " + authorization;
                            if (projectId) request.headers["projectId"] = projectId;
                            return request;
                        });

                        dashPlayer.initialize(video, src, false);

                        dashPlayer.on(dashjs.MediaPlayer.events.ERROR, function (e) {
                            log("dash error: " + JSON.stringify(e.error || e).substring(0, 200));
                        });
                        dashPlayer.on(dashjs.MediaPlayer.events.PLAYBACK_METADATA_LOADED, function () {
                            log("dash loaded: " + video.videoWidth + "x" + video.videoHeight);
                        });
                    } else {
                        // 인증 없이 직접 재생
                        log("mode: direct playback (no auth)");
                        video.src = src;
                        video.load();
                    }
                } else {
                    log("no src provided");
                }
            } catch (e) {
                log("init error: " + e.message);
            }
        </script>
    </body>
</html>
