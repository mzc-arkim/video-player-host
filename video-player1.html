<!-- video-player.html (webview 안에서 로드되는 로컬 HTML) -->
<!doctype html>
<html>
    <body style="margin: 0; background: #000">
        <video id="player" controls width="100%" height="210px"></video>
        <p
            id="debug"
            style="
                color: lime;
                font-size: 10px;
                word-break: break-all;
                position: absolute;
                top: 0;
                left: 0;
                z-index: 999;
            "
        ></p>
        <script>
            const hash = window.location.hash.substring(1);
            const b64 = hash.replace(/-/g, "+").replace(/_/g, "/");
            let params;
            try {
                params = JSON.parse(atob(b64));
            } catch (_e) {
                // 이전 방식 호환: 단순 URL 문자열
                params = { src: atob(b64) };
            }

            const { src, authorization, projectId } = params;

            if (src) {
                const video = document.getElementById("player");

                if (authorization) {
                    // 인증 헤더가 필요한 경우: fetch로 받아서 blob URL로 재생
                    const headers = {};
                    if (authorization) headers["Authorization"] = "Bearer " + authorization;
                    if (projectId) headers["projectId"] = projectId;

                    fetch(src, { headers: headers })
                        .then(function (res) {
                            if (!res.ok) throw new Error("HTTP " + res.status);
                            return res.blob();
                        })
                        .then(function (blob) {
                            video.src = URL.createObjectURL(blob);
                            video.load();
                        })
                        .catch(function (err) {
                            document.getElementById("debug").textContent = "Error: " + err.message;
                        });
                } else {
                    video.src = src;
                    video.load();
                }
            }
        </script>
    </body>
</html>
