<!-- video-player.html (webview 안에서 로드되는 로컬 HTML) -->
<!doctype html>
<html>
    <body style="margin: 0; background: #000">
        <video id="player" controls width="100%" height="209px"></video>
        <p
            id="debug"
            style="
                color: lime;
                font-size: 10px;
                word-break: break-all;
                position: absolute;
                top: 0;
                left: 0;
                z-index: 999;
            "
        ></p>
        <script>
            const hash = window.location.hash.substring(1);
            const b64 = hash.replace(/-/g, "+").replace(/_/g, "/");
            const src = atob(b64);

            if (src) {
                const video = document.getElementById("player");
                video.src = src;
                video.load();
            }
        </script>
    </body>
</html>
