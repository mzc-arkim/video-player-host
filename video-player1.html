<!-- video-player.html (webview 안에서 로드되는 로컬 HTML) -->
<!doctype html>
<html>
    <body style="margin: 0; background: #000">
        <video id="player" controls width="100%" height="210px"></video>
        <p
            id="debug"
            style="
                color: lime;
                font-size: 10px;
                word-break: break-all;
                position: absolute;
                top: 0;
                left: 0;
                z-index: 999;
                margin: 4px;
            "
        ></p>
        <script>
            var dbg = document.getElementById("debug");
            function log(msg) {
                dbg.textContent += msg + "\n";
                console.log("[video-player]", msg);
            }

            try {
                var hash = window.location.hash.substring(1);
                log("hash length: " + hash.length);

                var b64 = hash.replace(/-/g, "+").replace(/_/g, "/");
                var decoded = atob(b64);
                var params;
                try {
                    params = JSON.parse(decoded);
                    log("params parsed (JSON)");
                } catch (_e) {
                    params = { src: decoded };
                    log("params parsed (plain URL)");
                }

                var src = params.src;
                var authorization = params.authorization;
                var projectId = params.projectId;

                log("src: " + (src ? src.substring(0, 80) + "..." : "null"));
                log("authorization: " + (authorization ? "Bearer ***" + authorization.slice(-6) : "null"));
                log("projectId: " + (projectId || "null"));

                function isUsingCDN(uri) {
                    if (!uri) return false;
                    var regExp = new RegExp("(s3-|s3.)?(.*).amazonaws.com");
                    return regExp.test(uri) === false;
                }

                log("isUsingCDN: " + isUsingCDN(src));

                if (src) {
                    var video = document.getElementById("player");

                    video.addEventListener("error", function () {
                        var e = video.error;
                        log("video error: code=" + e.code + " message=" + (e.message || "unknown"));
                    });

                    if (authorization && !isUsingCDN(src)) {
                        // CDN(비-S3) URL인 경우: 인증 헤더를 포함하여 fetch 후 blob URL로 재생
                        var headers = {};
                        if (authorization) headers["Authorization"] = "Bearer " + authorization;
                        if (projectId) headers["projectId"] = projectId;

                        log("fetching with auth headers...");

                        fetch(src, { headers: headers })
                            .then(function (res) {
                                log("fetch status: " + res.status + " " + res.statusText);
                                log("content-type: " + (res.headers.get("content-type") || "unknown"));
                                if (!res.ok) throw new Error("HTTP " + res.status + " " + res.statusText);
                                return res.blob();
                            })
                            .then(function (blob) {
                                log("blob size: " + blob.size + " type: " + blob.type);
                                video.src = URL.createObjectURL(blob);
                                video.load();
                                log("video loaded from blob");
                            })
                            .catch(function (err) {
                                log("fetch error: " + err.message);
                            });
                    } else {
                        // S3 URL이거나 인증 정보가 없는 경우: 직접 재생 (pre-signed URL)
                        log("direct playback (no auth headers)");
                        video.src = src;
                        video.load();
                    }
                } else {
                    log("no src provided");
                }
            } catch (e) {
                log("init error: " + e.message);
            }
        </script>
    </body>
</html>
