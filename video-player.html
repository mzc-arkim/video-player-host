<!-- video-player.html (webview 안에서 로드되는 로컬 HTML) -->
<!doctype html>
<html>
    <body style="margin: 0; background: #000">
        <video id="player" controls width="100%" height="215px"></video>

        <script>
            const src = decodeURIComponent(window.location.hash.substring(1));

            if (src) {
                const video = document.getElementById("player");
                video.src = src;
                video.load();
            }
        </script>
    </body>
</html>
